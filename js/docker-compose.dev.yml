# Local development — runs PostgreSQL only.
# The app runs on the host with `npm run dev` for hot-reload.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   cp .env.example .env  # fill in values; PG_HOST=localhost PG_PORT=5432
#   npm run dev

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: patient_portal_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d patient_portal_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_dev_data:

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-patient_portal}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-patient_portal}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      target: production
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    environment:
      NODE_ENV: production
      PORT: 8000
      HOST: 0.0.0.0
      PG_HOST: db
      PG_PORT: 5432
      PG_USERNAME: ${POSTGRES_USER:-postgres}
      PG_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PG_DB: ${POSTGRES_DB:-patient_portal}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:

# Lefthook — git hook configuration for the patient-management-portal monorepo
# Docs: https://lefthook.dev/configuration/
#
# Hooks are installed automatically when you run `npm install` inside js/.
# To (re)install manually:  cd js && npx lefthook install

pre-commit:
  parallel: true
  jobs:
    - name: js — biome lint + format
      root: "js/"
      glob: "*.{ts,tsx,js,jsx,json}"
      exclude: "drizzle/**"
      run: sh -c 'staged="{staged_files}"; [ -z "$staged" ] && exit 0; npx @biomejs/biome check --write $staged'
      stage_fixed: true

    - name: js — typescript
      root: "js/"
      glob: "*.ts"
      run: npx tsc --noEmit

    - name: web — biome lint + format
      root: "web/"
      glob: "*.{ts,tsx,js,jsx,json}"
      run: sh -c 'staged="{staged_files}"; [ -z "$staged" ] && exit 0; npx @biomejs/biome check --write $staged'
      stage_fixed: true

    - name: web — typescript
      root: "web/"
      glob: "*.{ts,tsx}"
      run: npx tsc --noEmit

pre-push:
  jobs:
    - name: js — vitest
      root: "js/"
      glob: "*.ts"
      run: npm test
